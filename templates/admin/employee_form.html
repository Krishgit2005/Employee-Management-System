{% extends "layout.html" %}

{% block page_title %}{{ action }} Employee{% endblock %}
{% block page_subtitle %}{{ 'Register a new team member' if action == 'Add' else 'Modify employee details' }}.{% endblock %}

{% block content %}
<div class="glass-card animate-fade-in" style="max-width: 800px; margin: 0 auto;">
    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <!-- Left Column: Credentials -->
            <div>
                <h2 style="margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--primary-light);">Account Credentials</h2>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" required placeholder="e.g. jdoe">
                </div>
                
                <div class="form-group">
                    <label>Password {% if action == 'Edit' %}(leave blank to keep current){% endif %}</label>
                    <input type="password" name="password" class="form-control" {% if action == 'Add' %}required{% endif %} placeholder="••••••••">
                </div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" value="{{ user.full_name if user else '' }}" required placeholder="Jane Doe">
                </div>
            </div>
            
            <!-- Right Column: Profile -->
            <div>
                <h2 style="margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--primary-light);">Professional Details</h2>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required placeholder="jane.doe@ems.local">
                </div>
                
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" name="position" class="form-control" value="{{ user.position if user else '' }}" placeholder="Senior Developer">
                </div>
                
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" class="form-control" value="{{ user.department if user else '' }}" placeholder="Engineering">
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
            <label>Base Salary (Monthly)</label>
            <div style="position: relative;">
                <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">$</span>
                <input type="number" step="0.01" name="base_salary" class="form-control" style="padding-left: 2.25rem;" value="{{ user.base_salary if user else '' }}" placeholder="0.00">
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2.5rem; justify-content: flex-end;">
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                {{ action }} Employee Record
            </button>
        </div>
    </form>
</div>
{% endblock %}
