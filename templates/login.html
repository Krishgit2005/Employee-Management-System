<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EMS Premium</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="glass-card login-card animate-fade-in" style="max-width: 420px; width: 100%;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="width: 64px; height: 64px; background: var(--primary-gradient); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);">
                    <i class="ph ph-users-three" style="font-size: 2rem; color: white;"></i>
                </div>
                <h1 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em;">Welcome Back</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem;">Please enter your credentials to continue</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }}" style="margin-bottom: 1.5rem; padding: 1rem; border-radius: 12px; font-size: 0.9rem; display: flex; align-items: center; gap: 0.75rem;">
                            <i class="ph ph-warning-circle"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div style="position: relative;">
                        <i class="ph ph-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="text" id="username" name="username" class="form-control" style="padding-left: 2.75rem;" required autocomplete="username" placeholder="Enter your username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <i class="ph ph-lock-simple" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="password" id="password" name="password" class="form-control" style="padding-left: 2.75rem;" required autocomplete="current-password" placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%; height: 50px; font-size: 1rem; margin-top: 2rem;">
                    Sign Into Dashboard <i class="ph ph-arrow-right" style="margin-left: 0.5rem;"></i>
                </button>
            </form>
            
            <div style="margin-top: 2rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
                <p>&copy; 2026 EMS Premium. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
